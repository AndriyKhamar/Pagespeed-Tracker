name: collect
on:
  schedule:
    - cron: '0 * * * *'   # hourly
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate config
        run: node scripts/validate-config.mjs
      - name: Collect PageSpeed data
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DASHBOARD_URL: https://andriykhamar.github.io/Pagespeed-Tracker/
        run: node scripts/collect.mjs
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs/data)" ]; then
            git add docs/data
            git commit -m "data: pagespeed run $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase --autostash origin main
            git push
          else
            echo "No changes"
          fi
