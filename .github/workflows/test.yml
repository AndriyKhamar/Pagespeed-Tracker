name: test
on:
  push:
    paths-ignore: ['docs/data/**']   # skip hourly bot data commits
  pull_request:

jobs:
  node-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --test
